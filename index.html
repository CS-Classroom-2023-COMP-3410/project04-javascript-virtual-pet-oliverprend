<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Pet Dashboard</h1>

    <div id="pet">
        <img src="images/pet.png" alt="pet">
    </div>

    <div id="controls">
        <button id="feedButton">Feed</button>
        <button id="playButton">Play</button>
        <button id="sleepButton">Sleep</button>
    </div>

    <div id="statuses">
        <p>Hunger: <span id="hunger">50</span></p>
        <p>Energy: <span id="energy">50</span></p>
        <p>Mood: <span id="mood">50</span></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
